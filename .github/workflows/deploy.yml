name: Deploy to Production (SFTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar CSS de Tailwind
        run: npm run build:css

      - name: Preparar carpeta de despliegue (excluir archivos)
        run: |
          mkdir -p deploy_dist
          rsync -av --delete \
            --exclude='.git*' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='trash/' \
            --exclude='.vscode/' \
            --exclude='*.mp4' \
            ./ deploy_dist/

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local_path: './deploy_dist'
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}
          sftp_only: true
